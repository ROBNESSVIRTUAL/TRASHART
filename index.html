<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>toter.io - TRASHART NFT Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&family=Metal+Mania&family=Monoton&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0a0a0a;font-family:'Courier New',monospace;color:#fff}
body{display:flex;flex-direction:column}

/* Hero Section */
#hero{position:relative;width:100%;height:320px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);overflow:hidden;display:flex;align-items:center;justify-content:center;border-bottom:3px solid #00ff88}
#hero canvas{max-width:100%;max-height:100%;display:block}
#hero-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-family:'Metal+Mania',cursive;font-size:48px;font-weight:bold;color:#00ff88;text-shadow:0 0 20px #00ff88,0 0 40px #ff0055;z-index:10;pointer-events:none;letter-spacing:4px}

/* Search Section */
#search-section{padding:32px 24px;background:#111;border-bottom:2px solid #00ff88}
.search-container{max-width:1200px;margin:0 auto}
.search-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:16px}
.search-header h1{font-family:'Press Start 2P',cursive;font-size:24px;color:#00ff88;letter-spacing:2px;text-transform:uppercase;animation:flicker 0.15s infinite}
.chain-toggle{display:flex;gap:8px;align-items:center}
.chain-btn{padding:8px 16px;border:2px solid #00ff88;background:#0a0a0a;color:#00ff88;cursor:pointer;font-weight:bold;font-family:'Courier New',monospace;font-size:12px;transition:all 0.2s;text-transform:uppercase}
.chain-btn:hover{background:#00ff88;color:#0a0a0a;transform:scale(1.05)}
.chain-btn.active{background:#00ff88;color:#0a0a0a;box-shadow:0 0 15px #00ff88}
.search-input-group{display:grid;grid-template-columns:1fr auto auto;gap:12px;margin-bottom:16px}
#search-input{padding:12px 16px;border:2px solid #00ff88;background:#0a0a0a;color:#00ff88;font-family:'Courier New',monospace;font-size:14px;transition:all 0.2s}
#search-input:focus{outline:none;box-shadow:0 0 20px #00ff88;border-color:#ff0055}
#search-input::placeholder{color:#00ff8855}
#search-btn{padding:12px 24px;border:2px solid #ff0055;background:#ff0055;color:#fff;cursor:pointer;font-weight:bold;font-family:'Metal+Mania',cursive;font-size:14px;transition:all 0.2s;text-transform:uppercase;letter-spacing:1px}
#search-btn:hover{transform:scale(1.05);box-shadow:0 0 20px #ff0055}
#search-btn:active{transform:scale(0.95)}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
.filter-label{color:#999}
input[type="range"]{width:100px;border:1px solid #00ff88}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;background:#00ff88;cursor:pointer;border:2px solid #00ff88}
input[type="range"]::-moz-range-thumb{width:16px;height:16px;background:#00ff88;cursor:pointer;border:2px solid #00ff88}

/* Results Section */
#results-section{padding:32px 24px;background:#0a0a0a;flex:1;max-width:1200px;margin:0 auto;width:100%}
#results-header{font-family:'Monoton',cursive;font-size:20px;color:#ff0055;margin-bottom:24px;letter-spacing:2px;text-transform:uppercase}
#results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:20px}
.nft-card{border:2px solid #00ff88;background:rgba(0,255,136,0.05);padding:0;overflow:hidden;transition:all 0.3s;cursor:pointer;position:relative}
.nft-card:hover{transform:translate(-4px,-4px);box-shadow:4px 4px 0 #ff0055,8px 8px 0 #00ff88;border-color:#ff0055}
.nft-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,255,136,0.1) 2px,rgba(0,255,136,0.1) 4px);pointer-events:none;z-index:1}
.nft-image{width:100%;height:200px;background:#1a1a2e;object-fit:cover;display:block;border-bottom:2px solid #00ff88}
.nft-info{padding:12px;position:relative;z-index:2}
.nft-title{font-family:'Metal+Mania',cursive;font-size:14px;font-weight:bold;color:#00ff88;margin-bottom:6px;line-height:1.2;word-break:break-word}
.nft-meta{font-size:11px;color:#999;margin-bottom:8px;line-height:1.4}
.nft-meta-item{display:flex;justify-content:space-between;margin-bottom:4px}
.nft-price{font-family:'Press Start 2P',cursive;font-size:10px;color:#ff0055;margin-bottom:8px;letter-spacing:1px}
.nft-links{display:flex;gap:6px;margin-top:8px}
.nft-link{padding:6px 10px;border:1px solid #00ff88;background:#0a0a0a;color:#00ff88;text-decoration:none;font-size:10px;transition:all 0.2s;flex:1;text-align:center;font-weight:bold}
.nft-link:hover{background:#00ff88;color:#0a0a0a}

/* Loading & Status */
#loading{display:none;text-align:center;padding:40px;color:#00ff88;font-family:'Press Start 2P',cursive;font-size:14px}
#loading.active{display:block;animation:pulse 1s infinite}
#status{padding:16px;margin-bottom:16px;border-left:4px solid #00ff88;background:rgba(0,255,136,0.1);color:#00ff88;font-size:12px;display:none}
#status.active{display:block}
#status.error{border-left-color:#ff0055;background:rgba(255,0,85,0.1);color:#ff0055}

/* Animations */
@keyframes flicker{0%,18%,22%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:0.8}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* Responsive */
@media(max-width:768px){
#hero-overlay{font-size:32px}
#search-input-group{grid-template-columns:1fr}
#results-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.search-header{flex-direction:column;align-items:flex-start}
.search-input-group{grid-template-columns:1fr auto}
#search-btn{width:100%}
}
</style>
</head>
<body>

<!-- Hero Section with TRASHART Animation -->
<div id="hero">
  <canvas id="bg-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="hero-overlay">⚡ TRASHART ⚡</div>
</div>

<!-- Search Section -->
<div id="search-section">
  <div class="search-container">
    <div class="search-header">
      <h1>NFT SEARCH</h1>
      <div class="chain-toggle">
        <span style="font-size:12px;color:#999">BLOCKCHAIN:</span>
        <button class="chain-btn active" data-chain="ethereum">ETH</button>
        <button class="chain-btn" data-chain="tezos">XTZ</button>
        <button class="chain-btn" data-chain="both">BOTH</button>
      </div>
    </div>
    <div class="search-input-group">
      <input type="text" id="search-input" placeholder="Search by artist, collection, description..." />
      <input type="range" id="price-range" min="0" max="100" value="100" title="Max price filter (0-100 ETH or XTZ)">
      <button id="search-btn">FIND</button>
    </div>
    <div class="filters">
      <span class="filter-label">Max Price:</span>
      <span id="price-display">100</span>
      <span class="filter-label">|</span>
      <span class="filter-label" id="result-count">Ready to search</span>
    </div>
  </div>
</div>

<!-- Status Messages -->
<div id="status"></div>

<!-- Results Section -->
<div id="results-section">
  <div id="loading">Searching the blockchain...</div>
  <div id="results-header" style="display:none">RESULTS</div>
  <div id="results-grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────── TRASHART ANIMATION ───────────────────────
// Minimal Three.js scene for 3D chaos
let scene, camera, renderer, mesh;

function initThreeJS() {
  const canvas = document.getElementById('three-canvas');
  const width = canvas.parentElement.offsetWidth;
  const height = 320;
  
  canvas.width = width;
  canvas.height = height;
  
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  camera.position.z = 3;
  
  renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setClearColor(0x000000, 0.1);
  
  // Create a simple rotating box
  const geometry = new THREE.BoxGeometry(1, 1, 1);
  const material = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0xff0055 });
  mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);
  
  const light = new THREE.PointLight(0xffffff, 1, 100);
  light.position.set(5, 5, 5);
  scene.add(light);
  
  const ambLight = new THREE.AmbientLight(0x404040);
  scene.add(ambLight);
  
  animate();
}

function animate() {
  requestAnimationFrame(animate);
  if (mesh) {
    mesh.rotation.x += 0.005;
    mesh.rotation.y += 0.01;
  }
  renderer.render(scene, camera);
}

// ─────────────────────── SEARCH LOGIC ───────────────────────
let currentChain = 'ethereum';
const searchBtn = document.getElementById('search-btn');
const searchInput = document.getElementById('search-input');
const priceRange = document.getElementById('price-range');
const priceDisplay = document.getElementById('price-display');
const resultsGrid = document.getElementById('results-grid');
const resultsHeader = document.getElementById('results-header');
const loading = document.getElementById('loading');
const statusEl = document.getElementById('status');
const resultCount = document.getElementById('result-count');
const chainBtns = document.querySelectorAll('.chain-btn');

chainBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    chainBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentChain = btn.dataset.chain;
  });
});

priceRange.addEventListener('input', (e) => {
  priceDisplay.textContent = e.target.value;
});

searchInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchBtn.click();
});

searchBtn.addEventListener('click', async () => {
  const query = searchInput.value.trim();
  if (!query) {
    showStatus('Enter a search term', true);
    return;
  }
  
  loading.classList.add('active');
  resultsGrid.innerHTML = '';
  resultsHeader.style.display = 'none';
  statusEl.classList.remove('active');
  
  try {
    const response = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        chain: currentChain,
        maxPrice: parseFloat(priceRange.value)
      })
    });
    
    if (!response.ok) throw new Error(`API error: ${response.status}`);
    
    const data = await response.json();
    
    if (!data.results || data.results.length === 0) {
      showStatus('No TRASHART found. Try a different search.', true);
      resultCount.textContent = '0 results';
    } else {
      resultCount.textContent = `${data.results.length} results`;
      resultsHeader.style.display = 'block';
      renderResults(data.results);
      showStatus(`Found ${data.results.length} TRASHART pieces!`);
    }
  } catch (err) {
    console.error('Search error:', err);
    showStatus(`Error: ${err.message}`, true);
  } finally {
    loading.classList.remove('active');
  }
});

function renderResults(nfts) {
  resultsGrid.innerHTML = nfts.map(nft => `
    <div class="nft-card">
      <img src="${nft.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22240%22 height=%22200%22 style=%22background:%231a1a2e%22%3E%3C/svg%3E'}" alt="${nft.title}" class="nft-image" onerror="this.style.background='#1a1a2e'">
      <div class="nft-info">
        <div class="nft-title">${escapeHtml(nft.title || 'Untitled')}</div>
        <div class="nft-meta">
          <div class="nft-meta-item">
            <span>Artist:</span>
            <span>${escapeHtml(nft.creator_name || '?')}</span>
          </div>
          <div class="nft-meta-item">
            <span>Collection:</span>
            <span>${escapeHtml(nft.collection_name || '?')}</span>
          </div>
          <div class="nft-meta-item">
            <span>Chain:</span>
            <span>${nft.chain.toUpperCase()}</span>
          </div>
        </div>
        <div class="nft-price">
          ${nft.price_eth ? `${parseFloat(nft.price_eth).toFixed(2)} ETH` : ''}
          ${nft.price_xtz ? `${parseFloat(nft.price_xtz).toFixed(0)} XTZ` : ''}
          ${!nft.price_eth && !nft.price_xtz ? 'Price N/A' : ''}
        </div>
        <div class="nft-links">
          ${nft.marketplace_url ? `<a href="${nft.marketplace_url}" target="_blank" class="nft-link">View</a>` : ''}
          ${nft.ipfs_hash ? `<a href="https://ipfs.io/ipfs/${nft.ipfs_hash}" target="_blank" class="nft-link">IPFS</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function showStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.classList.add('active');
  if (isError) statusEl.classList.add('error');
  else statusEl.classList.remove('error');
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

// Initialize on load
window.addEventListener('load', () => {
  initThreeJS();
  resultCount.textContent = 'Ready to search';
});

// Handle window resize
window.addEventListener('resize', () => {
  if (renderer) {
    const width = document.getElementById('three-canvas').parentElement.offsetWidth;
    const height = 320;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height);
  }
});
</script>

</body>
</html>
